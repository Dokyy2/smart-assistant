<style>
:root {
    --primary-color: #2563eb;
    --accent-color: #3b82f6;
    --bg-dark: #0f172a;
    --glass-bg: rgba(255, 255, 255, 0.92);
}
* { box-sizing: border-box; }
body {
    margin: 0; direction: rtl; font-family: 'Cairo', sans-serif;
    background: linear-gradient(-45deg, #0f172a, #1e293b, #2563eb, #1e293b);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; overflow: hidden;
}
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
.chat-container {
    width: 100%; max-width: 450px; height: 90vh;
    background: var(--glass-bg); backdrop-filter: blur(15px);
    border-radius: 30px; display: flex; flex-direction: column;
    overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.3);
}
.header {
    padding: 20px; text-align: center; background: white;
    border-bottom: 1px solid rgba(0,0,0,0.05); font-weight: 700;
    color: #1e293b; font-size: 1.1rem; position: relative;
}
.chat-area {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 15px;
    background: rgba(248, 250, 252, 0.4);
}
.msg {
    max-width: 85%; padding: 14px 18px; border-radius: 20px;
    line-height: 1.6; font-size: 0.95rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.bot-msg { background: white; color: #334155; align-self: flex-start; border-bottom-right-radius: 5px; }
.user-msg { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; align-self: flex-end; border-bottom-left-radius: 5px; }
.btn-link {
    display: block; margin-top: 12px; background: white; color: var(--primary-color);
    text-decoration: none; padding: 10px; border-radius: 12px; text-align: center;
    font-weight: 700; border: 2px solid var(--primary-color); transition: 0.3s;
}
.btn-link:hover { background: var(--primary-color); color: white; transform: translateY(-2px); }
.input-group { display: flex; padding: 20px; background: white; gap: 12px; }
input { flex: 1; padding: 14px 20px; border-radius: 15px; border: 2px solid #f1f5f9; outline: none; font-family: inherit; }
button { background: var(--primary-color); color: white; border: none; border-radius: 15px; padding: 0 25px; cursor: pointer; font-weight: 700; }
.typing { display: flex; gap: 4px; padding: 15px 20px !important; }
.dot { width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; animation: blink 1.4s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
</style>

// 1️⃣ تحسين normalize للغة العربية
function normalize(text) {
    if (!text) return "";
    return text
        .toLowerCase()
        .replace(/[^\u0600-\u06FF\s]/g, "") // حذف الرموز غير العربية
        .replace(/ة/g, "ه")
        .replace(/ى/g, "ي")
        .trim();
}

function similarity(a, b) {
    let matches = 0;
    for (let i = 0; i < Math.min(a.length, b.length); i++) {
        if (a[i] === b[i]) matches++;
    }
    return matches / Math.max(a.length, b.length);
}

function detectIntent(text) {
    const normText = normalize(text);
    if (normText.includes("ازاي") || normText.includes("اعمل") || normText.includes("اطلع") || normText.includes("خطوات") || normText.includes("ورق") || normText.includes("بكام") || normText.includes("سعر")) return "action";
    if (normText.includes("فين") || normText.includes("عنوان") || normText.includes("اروح") || normText.includes("لوكيشن") || normText.includes("مكان")) return "location";
    if (normText.includes("امتي") || normText.includes("مواعيد") || normText.includes("يفتح") || normText.includes("يقفل") || normText.includes("شغالين")) return "time";
    return "normal";
}

// 2️⃣ نظام الـ Scoring الذكي
function detectService(text) {
    const normText = normalize(text);
    if (!normText) return null;

    // 5️⃣ الحفاظ على أولوية الطوارئ
    const emergencyWords = ["جمعه", "عيد", "اجازه", "عطله"];
    if (emergencyWords.some(word => normText.includes(word))) {
        return "خدمات الطوارئ";
    }

    let scores = {};
    const inputWords = normText.split(/\s+/);

    for (let service in services) {
        if (service === "خدمات الطوارئ") continue;
        scores[service] = 0;

        for (let keyword of services[service].keywords) {
            const normKey = normalize(keyword);
            
            // تجاهل الكلمات القصيرة جداً (أقل من 3 حروف) أثناء المقارنة
            if (normKey.length < 3) continue;

            // لو نص المستخدم يحتوي على الكلمة بالظبط -> +3 نقاط
            if (normText.includes(normKey)) {
                scores[service] += 3;
            }

            // لو فيه Similarity بنظام الـ Scoring
            inputWords.forEach(word => {
                if (word.length >= 3) {
                    const sim = similarity(word, normKey);
                    if (sim > 0.6) {
                        scores[service] += sim;
                    }
                }
            });
        }
    }

    // اختيار الخدمة الأعلى نقاطاً
    let bestMatch = null;
    let maxScore = 0;

    for (let service in scores) {
        if (scores[service] > maxScore) {
            maxScore = scores[service];
            bestMatch = service;
        }
    }

    // الـ Threshold المطلوب (مثلاً 1)
    return maxScore >= 1 ? bestMatch : null;
}

function handleSend() {
    let input = document.getElementById("userInput");
    let text = input.value.trim();
    if (!text) return;
    addMessage(text, "user");
    input.value = "";
    showTyping();
    setTimeout(() => {
        removeTyping();
        let serviceName = detectService(text);
        let intent = detectIntent(text);
        if (serviceName) {
            let s = services[serviceName];
            let extra = "";
            if (intent === "action") extra = "📄 <b>بخصوص الأوراق والخطوات:</b><br>";
            else if (intent === "location") extra = "📍 <b>بخصوص المكان والموقع:</b><br>";
            else if (intent === "time") extra = "⏰ <b>بخصوص المواعيد:</b><br>";
            let response = `${extra}${s.msg}<br><a href="${s.link}" target="_blank" class="btn-link">فتح الخدمة: ${serviceName}</a>`;
            addMessage(response, "bot");
        } else {
            addMessage("🤔 عذراً، لم أفهم طلبك تماماً. هل تبحث عن (تطعيمات، تسجيل مواليد، أو خدمات الطوارئ)؟", "bot");
        }
    }, 1000);
}

function addMessage(text, type) {
    let chat = document.getElementById("chatArea");
    let div = document.createElement("div");
    div.className = "msg " + (type === "user" ? "user-msg" : "bot-msg");
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
    let chat = document.getElementById("chatArea");
    let div = document.createElement("div");
    div.id = "typing";
    div.className = "msg bot-msg typing";
    div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
    let t = document.getElementById("typing");
    if (t) t.remove();
}

document.getElementById("userInput").addEventListener("keydown", function(e){
    if (e.key === "Enter") {
        e.preventDefault();
        handleSend();
    }
});
